name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"   # semanal, lunes 03:00 UTC

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # subir resultados a Code Scanning
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: github/codeql-action/init@c35d1b164463ee62a100735382aaaa525c5d3496  # v2.25.6
        with:
          languages: python
          queries: security-extended
      - uses: github/codeql-action/analyze@c35d1b164463ee62a100735382aaaa525c5d3496  # v2.25.6
